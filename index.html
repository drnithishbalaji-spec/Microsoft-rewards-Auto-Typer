<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Typer Notepad Extension</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Consolas&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents body scrolling */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 20px;
        }

        /* Fixed Controller at the top so it's always visible */
        .status-pill {
            background: rgba(28, 28, 28, 0.95);
            padding: 8px 12px;
            border-radius: 40px;

            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            color: white;

            max-width: 350px;
            z-index: 1000;
            margin-bottom: 20px;
        }

        .status-dot {
            width: 10px;

            border-radius: 50%;
            transition: background-color 0.3s ease;
        }

        .dot-idle { background-color: #ff4d4d; }
        .dot-active { background-color: #4df33b; box-shadow: 0 0 8px #4df33b; }

        .status-text {
            font-size: 14px;
            flex-grow: 1;
            white-space: nowrap;
        }

        .action-button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .action-button.active {
            background-color: #ef4444;
        }

        /* Notepad Window - Adjusted height for better fit */
        .notepad-window {
            width: 95%;
            max-width: 400px;
            height: 60vh; /* Responsive height */
            background: white;
            border: 1px solid #999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            border-radius: 2px;
        }

        .notepad-title-bar {
            height: 30px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;

            color: #333;
            border-bottom: 1px solid #f0f0f0;
        }

            display: flex;

    </style>
</head>
<body>

    <!-- Controller Bar (Now at the top) -->
    <div class="status-pill">
        <div id="indicator" class="status-dot dot-idle"></div>
        <span id="statusLabel" class="status-text">Extension Idle</span>
        <button id="mainAction" class="action-button">Start Auto-Type</button>
    </div>

    <!-- Notepad Window -->
    <div id="notepad" class="notepad-window">
        <div class="notepad-title-bar">
            <span>AutoTyper.txt - Notepad</span>
            <div class="flex gap-3">
                <span>—</span>
                <span>□</span>
                <span class="text-red-500">✕</span>
            </div>
        </div>
        <div class="notepad-menu">
            <span>File</span>
            <span>Edit</span>
            <span>Format</span>
            <span id="clearBtn" class="clear-link">Clear Text</span>
        </div>
        <div id="textOutput" class="notepad-content"></div>
    </div>

    <script>
        const textOutput = document.getElementById('textOutput');
        const mainAction = document.getElementById('mainAction');
        const indicator = document.getElementById('indicator');
        const statusLabel = document.getElementById('statusLabel');
        const clearBtn = document.getElementById('clearBtn');

        const wordBank = [
            "FIRE", "WIND", "GOLD", "BLUE", "STAR", "MOON", "RAIN", "SNOW", 
            "BIRD", "FISH", "TREE", "FAST", "SLOW", "DARK", "GLOW", "TIME",
            "MIND", "KIND", "PURE", "TRUE", "FREE", "WAVE", "ROCK", "SAND",
            "SOFT", "LOUD", "PLAY", "WORK", "JUMP", "STAY", "OPEN", "LOOK"
        ];

        let isRunning = false;
        let typingTimeout;

        async function typeCharacter(char) {
            return new Promise(resolve => {
                const delay = 120; 
                typingTimeout = setTimeout(() => {
                    textOutput.innerText += char;
                    textOutput.scrollTop = textOutput.scrollHeight;
                    resolve();
                }, delay);
            });
        }

        async function runAutoType() {
            while (isRunning) {
                const word = wordBank[Math.floor(Math.random() * wordBank.length)];
                
                if (textOutput.innerText.length > 0) {
                    textOutput.innerText += " ";
                }

                for (const char of word) {
                    if (!isRunning) return;
                    await typeCharacter(char);
                }

                await new Promise(r => setTimeout(r, 800));
            }
        }

        mainAction.addEventListener('click', () => {
            isRunning = !isRunning;
            
            if (isRunning) {
                mainAction.innerText = "Stop Typing";
                mainAction.classList.add('active');
                indicator.classList.replace('dot-idle', 'dot-active');
                statusLabel.innerText = "Extension Active";
                runAutoType();
            } else {
                clearTimeout(typingTimeout);
                mainAction.innerText = "Start Auto-Type";
                mainAction.classList.remove('active');
                indicator.classList.replace('dot-active', 'dot-idle');
                statusLabel.innerText = "Extension Idle";
            }
        });

        clearBtn.addEventListener('click', () => {
            textOutput.innerText = "";
        });
    </script>
</body>
</html>
